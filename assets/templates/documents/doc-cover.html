<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=210mm" />
  <title>Document Cover</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
            mono: ['JetBrains Mono', 'Menlo', 'monospace'],
          },
          letterSpacing: {
            'display': '-0.1em',
            'heading': '-0.06em',
            'body': '-0.025em',
            'label': '-0.01em',
          },
          lineHeight: {
            'tight': '1.15',
            'snug': '1.3',
            'relaxed': '1.75',
          },
        },
      },
    };
  </script>
</head>
<body class="m-0 p-0 bg-zinc-950">

  <!-- Document Container: A4 -->
  <div class="relative w-[210mm] min-h-[297mm] bg-zinc-950 overflow-hidden font-sans">

    <!-- Background decorative glow elements -->
    <div class="absolute top-[-120px] right-[-60px] w-[400px] h-[400px] rounded-full bg-purple-600/5 blur-[100px]"></div>
    <div class="absolute bottom-[-150px] left-[80px] w-[300px] h-[300px] rounded-full bg-orange-500/4 blur-[120px]"></div>

    <!-- Content wrapper -->
    <div class="relative z-10 flex flex-col justify-between min-h-[297mm] px-16 py-16">

      <!-- Top section: Brand -->
      <div>
        <!-- REPLACE: Company/Brand Name -->
        <span class="font-mono uppercase tracking-label text-zinc-500 text-xs">
          Acme Corporation
        </span>
      </div>

      <!-- Center section: Title + Subtitle + Accent -->
      <div class="flex flex-col gap-6">
        <!-- REPLACE: Document Title -->
        <h1 class="text-5xl font-semibold tracking-heading text-zinc-100 leading-tight max-w-[600px]">
          Plano Estrategico de Transformacao Digital
        </h1>

        <!-- Gradient accent line -->
        <div class="w-32 h-1 rounded-full bg-gradient-to-r from-purple-400 to-orange-400"></div>

        <!-- REPLACE: Document Subtitle -->
        <p class="text-xl text-zinc-400 font-light max-w-[500px] leading-relaxed tracking-body">
          Roadmap completo para modernizacao da infraestrutura e processos corporativos
        </p>
      </div>

      <!-- Bottom section: Metadata -->
      <div class="flex flex-col gap-4">
        <div class="w-full h-px bg-zinc-800"></div>
        <div class="flex items-start justify-between">
          <div class="flex flex-col gap-2">
            <!-- REPLACE: Author Name -->
            <div class="flex items-center gap-2">
              <span class="font-mono uppercase tracking-label text-zinc-600 text-xs">Autor</span>
              <span class="text-xs text-zinc-400 font-mono">Gabriel Falcao</span>
            </div>
            <!-- REPLACE: Date -->
            <div class="flex items-center gap-2">
              <span class="font-mono uppercase tracking-label text-zinc-600 text-xs">Data</span>
              <span class="text-xs text-zinc-400 font-mono">Abril 2026</span>
            </div>
          </div>
          <div class="flex flex-col gap-2 items-end">
            <!-- REPLACE: Version -->
            <div class="flex items-center gap-2">
              <span class="font-mono uppercase tracking-label text-zinc-600 text-xs">Versao</span>
              <span class="text-xs text-zinc-400 font-mono">v2.1</span>
            </div>
            <!-- REPLACE: Classification -->
            <span class="font-mono uppercase tracking-label text-zinc-600 text-xs">
              Confidencial
            </span>
          </div>
        </div>
      </div>

    </div>

  </div>

</body>
</html>
